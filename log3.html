<!DOCTYPE html>
<html>
<head>
  <title>Log 001</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!--Audio Elements-->
<audio id="log-music" loop>
  <source src="audio/logs-music.mp3" type="audio/mpeg">
</audio>

<h2>LOG 003 – PROTOTYPE (3/30/2026)</h2>

<p id="typed-text" class="log-text"></p>

<script>
// Typing effect
const text = `LOVER'S LOG 003
The NFC tag arrived today and I had to test it out, write the data onto it and make sure it all worked
We're in the final days of where I have to have everything ready and I am getting so nervous
bcause I just want you to like it.

If you don't, I'll understand. I don't want you to feel forced to like it. I asked Mom and Amb to send
a 'letter' if they wished so I could put it on your site and Mom sent the sweetest message! She was
a little confused when I first told her about it lol she was like 'what's coding a website?'.

I have to add the finishing touched and plan out how I'm going to give it to you. I love you so much!`;

let index = 0;
const speed = 30; // typing speed

function typeWriter() {
  if (index < text.length) {
    document.getElementById("typed-text").innerHTML += text.charAt(index);
    index++;
    setTimeout(typeWriter, speed);
  } else {
    // Add END OF LOG when typing is complete
    document.getElementById("typed-text").innerHTML += "\n\n[END OF LOG]";
  }
}

// Start typing when page loads
window.onload = typeWriter;
</script>

<a href="logs.html">← Back to Logs</a>

<script>
// Background music
const music = document.getElementById("log-music");

// Check if music was already playing
if (localStorage.getItem("musicPlaying") === "true") {
  music.currentTime = localStorage.getItem("musicTime") || 0;
  music.play();
}

// Start music on first click
document.body.addEventListener("click", () => {
  if (!music.paused) return;
  music.play();
  localStorage.setItem("musicPlaying", "true");
});

// Save playback time before leaving page
window.addEventListener("beforeunload", () => {
  localStorage.setItem("musicTime", music.currentTime);
});
</script>

</body>
</html>
