<!DOCTYPE html>
<html>
<head>
  <title>Log 001</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!--Audio Elements-->
<audio id="log-music" loop>
  <source src="audio/logs-music.mp3" type="audio/mpeg">
</audio>

<h2>LOG 002 – LETTER FROM SISTER</h2>

<p id="typed-text" class="log-text"></p>

<script>
// Typing effect
const text = `
Happy Birthday to my Lil' Biddy!

What a privilege these last couple years have been, watching you grow professionally,
emotionally, & spiritually. I'm so proud of you, and thinking about you makes my heart smile
every single day. I love who you are, how you think, your tender heart, your stellar comedic timing. 

You're my favorite. I'm lucky to have you.

Love, Am
(a.k.a. Sissy, Ooka Dooka Dawn, & most unfortunately, Queef)`;

let index = 0;
const speed = 30; // typing speed

function typeWriter() {
  if (index < text.length) {
    document.getElementById("typed-text").innerHTML += text.charAt(index);
    index++;
    setTimeout(typeWriter, speed);
  } else {
    // Add END OF LOG when typing is complete
    document.getElementById("typed-text").innerHTML += "\n\n[END OF LETTER]";
  }
}

// Start typing when page loads
window.onload = typeWriter;
</script>

<a href="letters.html">← Back to Letters</a>

<script>
// Background music
const music = document.getElementById("log-music");

// Check if music was already playing
if (localStorage.getItem("musicPlaying") === "true") {
  music.currentTime = localStorage.getItem("musicTime") || 0;
  music.play();
}

// Start music on first click
document.body.addEventListener("click", () => {
  if (!music.paused) return;
  music.play();
  localStorage.setItem("musicPlaying", "true");
});

// Save playback time before leaving page
window.addEventListener("beforeunload", () => {
  localStorage.setItem("musicTime", music.currentTime);
});
</script>

</body>
</html>
