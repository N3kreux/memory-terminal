<p style="color: #00ff9f;">Click Anywhere To Start Letters Music...</p>

<script>
// Get the audio element
const music = document.getElementById("log-music");

// Web Audio API for fade-in
let audioCtx, source, gainNode;

function startMusicFadeIn() {
  if (music.paused) {
    // Create audio context if not already created
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      source = audioCtx.createMediaElementSource(music);
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0; // start silent
      source.connect(gainNode).connect(audioCtx.destination);
    }

    music.play(); // start playing
    // Gradually increase volume
    let volume = 0;
    const fadeDuration = 3000; // 3 seconds
    const step = 0.05;
    const interval = fadeDuration / (1 / step);

    const fade = setInterval(() => {
      if (volume < 1) {
        volume += step;
        gainNode.gain.setValueAtTime(Math.min(volume,1), audioCtx.currentTime);
      } else {
        clearInterval(fade);
      }
    }, interval);
    
    localStorage.setItem("musicPlaying", "true");
  }
}

// Check if music was already playing
if (localStorage.getItem("musicPlaying") === "true") {
  // Resume music immediately with fade
  startMusicFadeIn();
}

// Start music on first click anywhere
document.body.addEventListener("click", () => {
  startMusicFadeIn();
});

// Save playback time before leaving page
window.addEventListener("beforeunload", () => {
  localStorage.setItem("musicTime", music.currentTime);
});
</script>

</body>
