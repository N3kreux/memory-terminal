<!-- AUDIO ELEMENT -->
<audio id="bg-audio" src="audio/background.mp3" preload="auto"></audio>

<!-- AUDIO SCRIPT -->
<script>
window.addEventListener('DOMContentLoaded', () => {
  const bgAudio = document.getElementById('bg-audio');
  if (bgAudio) {
    bgAudio.loop = true;          // loop music indefinitely

    // Attempt to play immediately
    bgAudio.play().catch(() => {
      console.log("Autoplay blocked. Waiting for user interaction.");
    });

    // Fallback: start music on first click anywhere
    document.addEventListener('click', () => {
      if (bgAudio.paused) {
        bgAudio.play();
      }
    }, { once: true });
  }
});
</script>
