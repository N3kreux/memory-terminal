<a href="memories.html">[1] Memories</a>
<a href="lonely.html">[2] Open When Lonely</a>

<a href="secret.html">[4] Secret Message</a>

<p>&gt; try typing: <strong>love_you</strong></p>

<script>
document.addEventListener('keypress', function(e){
    if(e.key === 'Enter'){
        const cmd = prompt('Enter command:');
        if(cmd && cmd.toLowerCase() == 'love_you'){
            window.location = 'secret.html';
        }
    }
});
</script>
