<!-- AUDIO ELEMENT -->
<audio id="bg-audio" src="audio/background.mp3" preload="auto"></audio>

<script>
  // Play background music on page load
  const bgAudio = document.getElementById('bg-audio');
  bgAudio.volume = 0.5; // Set initial volume
  bgAudio.play().catch(() => {
    // Autoplay might be blocked, wait for user interaction
    console.log("Autoplay blocked, waiting for user interaction...");
  });

  // Also play music when user clicks anywhere (for autoplay fallback)
  document.body.addEventListener('click', () => {
    if (bgAudio.paused) {
      bgAudio.play();
    }
  });
</script>
