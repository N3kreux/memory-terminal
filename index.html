<!DOCTYPE html>
<html>
<head>
  <title>Memory Terminal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="boot-screen">
  <p id="boot-text"></p>
</div>

<button id="confirm-button" onclick="confirmIdentity()" style="display:none;">
  <img src="assets/icons/confirmid.png" class="button-icon" alt="Confirm Identity">
</button>

<div id="main-content" style="display:none;">
  <div class="ascii-wrapper">
    <img src="assets/mt-title.gif" id="title" alt="Memory Terminal Title">
  </div>

  <p>&gt; Access granted, Cariño 💖</p>

  <div class="panel">
    <a href="memories.html">
       <img src="assets/icons/icon.png" alt="Letter Icon" class="icon">[1] Memories</a> // include this code for icons
    <a href="lonely.html">[2] Open When Lonely</a>
    <a href="roadtrip.html">[3] Roadtrip Mode</a>
    <a href="secret.html">[4] Secret Message</a>
    <a href="logs.html">[5] LOVER'S LOGS</a>
  </div>


  <p>&gt; Or type command: <strong>love_you</strong></p>
</div>

<!-- AUDIO ELEMENTS -->
<audio id="bg-audio" src="audio/background.mp3" preload="auto"></audio>

<!-- SCRIPTS -->
<script>
// Boot sequence typing
const bootLines = [
  "> Initializing System...",
  "> Scanning Device...",
  "> Checking Identity...",
  "> Accessing Memory Core...",
  "> Ready!"
];

let i = 0;  // line
let j = 0;  // char
let currentLine = "";
const speed = 40;

function typeBoot() {
  const typeAudio = document.getElementById("type-sound"); // optional typing sound
  if (i < bootLines.length) {
    if (j < bootLines[i].length) {
      currentLine += bootLines[i].charAt(j);
      document.getElementById("boot-text").innerHTML = currentLine;

      if(typeAudio) {
        typeAudio.currentTime = 0;
        typeAudio.play().catch(() => {});
      }

      j++;
      setTimeout(typeBoot, speed);
    } else {
      currentLine += "<br>";
      i++;
      j = 0;
      setTimeout(typeBoot, 500);
    }
  } else {
    // Boot sequence finished → show confirm button
    const confirmBtn = document.getElementById("confirm-button");
    confirmBtn.style.display = "block";   // make button visible
    confirmBtn.style.opacity = 0;         // start invisible for fade-in
    setTimeout(() => { confirmBtn.style.transition = "opacity 0.8s ease-in"; confirmBtn.style.opacity = 1; }, 50);
  }
}
</script>

<script src="js/mt.js"></script>

</body>
</html>
