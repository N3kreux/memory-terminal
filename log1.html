<!DOCTYPE html>
<html>
<head>
  <title>Log 001</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!--Audio Elements-->
<audio id="log-music" loop>
  <source src="audio/logs-music.mp3" type="audio/mpeg">
</audio>

<h2>LOG 001 – INITIALIZATION (3/28/2026)</h2>

<p id="typed-text" class="log-text"></p>

<script>
// Typing effect
const text = `LOVER'S LOG 001
If you're reading this, it means you found this part of the system…  
which means you kept exploring. That’s very you.

I started building this because I wanted to give you something that lasts longer than a single day.
Something you can come back to when things feel heavy, or quiet, or even just normal.

It may not have much value in the sense of monetary worth, but I still put a lot of thought and care 
into creating this for you. Through a lot of trial and error, I have been able to create something
that can store and display these logs in a way that I hope feels personal and meaningful to you.

You deserve the world, and this is just the start of what I hope to give you. Our own little world in
the palm of your hand, where you can always find a piece of me, and a piece of us.

You matter to me in ways I’m still learning how to explain…
but I hope these logs help show it, piece by piece.`;

let index = 0;
const speed = 30; // typing speed

function typeWriter() {
  if (index < text.length) {
    document.getElementById("typed-text").innerHTML += text.charAt(index);
    index++;
    setTimeout(typeWriter, speed);
  } else {
    // Add END OF LOG when typing is complete
    document.getElementById("typed-text").innerHTML += "\n\n[END OF LOG]";
  }
}

// Start typing when page loads
window.onload = typeWriter;
</script>

<a href="logs.html">← Back to Logs</a>

<script>
// Background music
const music = document.getElementById("log-music");

// Check if music was already playing
if (localStorage.getItem("musicPlaying") === "true") {
  music.currentTime = localStorage.getItem("musicTime") || 0;
  music.play();
}

// Start music on first click
document.body.addEventListener("click", () => {
  if (!music.paused) return;
  music.play();
  localStorage.setItem("musicPlaying", "true");
});

// Save playback time before leaving page
window.addEventListener("beforeunload", () => {
  localStorage.setItem("musicTime", music.currentTime);
});
</script>

</body>
</html>
